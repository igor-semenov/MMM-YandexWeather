name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  quality-checks:
    name: Pre-release Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          for file in translations/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))"
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          # Extract changelog for current version
          CHANGELOG=$(awk '/^## \[?'"${{ steps.version.outputs.version }}"'\]?/,/^## \[?[0-9]/' CHANGELOG.md | sed '1d;$d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release ${{ steps.version.outputs.version }}"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Archive
        run: |
          mkdir -p release
          cp MMM-YandexWeather.js release/
          cp node_helper.js release/
          cp yandexweather.css release/
          cp package.json release/
          cp README.md release/
          cp LICENSE.md release/
          cp CHANGELOG.md release/
          cp .env.example release/
          cp -r translations release/
          cd release
          zip -r ../MMM-YandexWeather-${{ steps.version.outputs.version }}.zip .
          cd ..

      - name: Generate checksums
        run: |
          sha256sum MMM-YandexWeather-${{ steps.version.outputs.version }}.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            # MMM-YandexWeather ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            cd ~/MagicMirror/modules
            git clone https://github.com/${{ github.repository }}.git MMM-YandexWeather
            cd MMM-YandexWeather
            npm install --production
            ```

            Or download the release archive and extract to `modules/MMM-YandexWeather/`

            ## Checksums

            ```
            $(cat checksums.txt)
            ```

            ## What's Changed

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for full details.

          files: |
            MMM-YandexWeather-${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
