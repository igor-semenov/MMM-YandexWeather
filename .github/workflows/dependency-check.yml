name: Dependency Check

on:
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## Outdated Dependencies" > outdated.md
          npm outdated --long >> outdated.md || true
          cat outdated.md

      - name: Check for security vulnerabilities
        id: audit
        run: |
          echo "## Security Audit" > audit.md
          npm audit --audit-level=low >> audit.md || true
          cat audit.md

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outdated = fs.readFileSync('outdated.md', 'utf8');
            const audit = fs.readFileSync('audit.md', 'utf8');

            const title = '🔒 Security vulnerabilities or outdated dependencies detected';
            const body = `# Dependency Status Report

            This is an automated report from the dependency checker.

            ${audit}

            ${outdated}

            ## Actions Required

            1. Review the vulnerabilities and outdated packages above
            2. Run \`npm audit fix\` to automatically fix vulnerabilities
            3. Run \`npm update\` to update outdated packages
            4. Test the module after updates
            5. Create a PR with the updates

            ## Manual Commands

            \`\`\`bash
            npm audit fix
            npm update
            npm test
            \`\`\`

            ---
            *This issue was created automatically by the dependency-check workflow.*
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['dependencies', 'security']
            });

  update-dependencies:
    name: Auto-update Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update dependencies
        run: |
          npm update
          npm audit fix || true

      - name: Run tests
        run: npm run lint

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update dependencies'
          title: '🔄 Automated dependency updates'
          body: |
            # Automated Dependency Updates

            This PR contains automated dependency updates.

            ## Changes
            - Updated npm packages to latest compatible versions
            - Applied security fixes from `npm audit fix`

            ## Testing
            - ✅ ESLint checks passed
            - ⚠️  Please verify functionality manually

            ## Review Checklist
            - [ ] Review `package.json` changes
            - [ ] Test module in MagicMirror
            - [ ] Check for breaking changes in updated packages

            ---
            *This PR was created automatically by the dependency-check workflow.*

          branch: chore/dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
