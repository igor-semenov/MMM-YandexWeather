name: PR Quality Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]

jobs:
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Validate JSON files
        run: |
          echo "Validating package.json..."
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          echo "✓ package.json is valid"

          if [ -d "translations" ]; then
            echo "Validating translation files..."
            for file in translations/*.json; do
              if [ -f "$file" ]; then
                node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))"
                echo "✓ $file is valid"
              fi
            done
          fi

      - name: Check file sizes
        run: |
          echo "Checking JavaScript file sizes..."
          for file in *.js; do
            if [ -f "$file" ]; then
              SIZE=$(wc -c < "$file")
              LINES=$(wc -l < "$file")
              if [ "$SIZE" -gt 100000 ]; then
                echo "⚠️  $file is large: ${SIZE} bytes (${LINES} lines)"
              else
                echo "✓ $file: ${SIZE} bytes (${LINES} lines)"
              fi
            fi
          done

      - name: Check for console.log statements
        run: |
          if grep -r "console\.log" --include="*.js" --exclude="check.sh" --exclude="node_helper.js" --exclude-dir=node_modules . 2>/dev/null | grep -v "//.*console\.log"; then
            echo "⚠️  Found console.log statements in frontend code"
            exit 1
          else
            echo "✓ No console.log in frontend code"
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -r "X-Yandex-Weather-Key.*[a-f0-9]\{8\}-" --include="*.js" --exclude-dir=node_modules . 2>/dev/null; then
            echo "❌ Hardcoded API key detected!"
            exit 1
          else
            echo "✓ No hardcoded API keys detected"
          fi

  build-test:
    name: Build & Integration Test
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify module structure
        run: |
          echo "Checking required files..."
          REQUIRED_FILES=(
            "MMM-YandexWeather.js"
            "node_helper.js"
            "package.json"
            "README.md"
            "LICENSE.md"
            "yandexweather.css"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

      - name: Check translations
        run: |
          if [ -d "translations" ]; then
            if [ -f "translations/en.json" ]; then
              echo "✓ English translations exist"
            else
              echo "❌ translations/en.json missing"
              exit 1
            fi

            if [ -f "translations/ru.json" ]; then
              echo "✓ Russian translations exist"
            else
              echo "❌ translations/ru.json missing"
              exit 1
            fi
          else
            echo "❌ translations directory missing"
            exit 1
          fi

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.quality-checks.result }}" == "success" ] && [ "${{ needs.build-test.result }}" == "success" ]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Some checks failed"
            echo "Quality checks: ${{ needs.quality-checks.result }}"
            echo "Build test: ${{ needs.build-test.result }}"
            exit 1
          fi
